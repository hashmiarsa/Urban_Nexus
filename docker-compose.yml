# ===========================================================================
# Urban Nexus â€” Docker Compose (FINAL â€” Phase 5)
# Services: mongo, backend, frontend, nginx
#
# Usage:
#   Start:   docker-compose up -d
#   Stop:    docker-compose down
#   Rebuild: docker-compose up -d --build
#   Logs:    docker-compose logs -f backend
#
# Copy backend/.env.example to backend/.env and fill all values before running
# ===========================================================================

version: "3.9"

services:

  # -------------------------------------------------------------------------
  # MongoDB
  # -------------------------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: urban-nexus-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: urban-nexus
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - urban-nexus-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 20s

  # -------------------------------------------------------------------------
  # Backend â€” Node.js + Express + Socket.io
  # -------------------------------------------------------------------------
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: urban-nexus-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV:               production
      PORT:                   5000
      MONGO_URI:              mongodb://mongo:27017/urban-nexus
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRY:             ${JWT_EXPIRY:-7d}
      CLOUDINARY_CLOUD_NAME:  ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:     ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET:  ${CLOUDINARY_API_SECRET}
      CLIENT_ORIGIN:          http://localhost
    volumes:
      - backend_logs:/app/logs
    networks:
      - urban-nexus-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 25s

  # -------------------------------------------------------------------------
  # Frontend â€” React + Vite served via nginx
  # -------------------------------------------------------------------------
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: urban-nexus-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - urban-nexus-network

  # -------------------------------------------------------------------------
  # Nginx â€” reverse proxy
  # Routes /api and /socket.io to backend, everything else to frontend
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: urban-nexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - urban-nexus-network

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  urban-nexus-network:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  mongo_data:
    driver: local
  backend_logs:
    driver: local
