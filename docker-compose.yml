# ===========================================================================
# Urban Nexus — Docker Compose
# Phase 1: backend + mongo only
# Phase 5 will add: frontend, nginx
#
# Usage:
#   Start:   docker-compose up -d
#   Stop:    docker-compose down
#   Logs:    docker-compose logs -f backend
#   Rebuild: docker-compose up -d --build
# ===========================================================================

version: "3.9"

services:

  # -------------------------------------------------------------------------
  # MongoDB
  # -------------------------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: urban-nexus-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: urban-nexus
    ports:
      - "27017:27017"       # expose for local tools like MongoDB Compass
    volumes:
      - mongo_data:/data/db  # persist data across container restarts
    networks:
      - urban-nexus-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 20s

  # -------------------------------------------------------------------------
  # Backend — Node.js + Express API
  # -------------------------------------------------------------------------
  backend:
    build:
      context:    .           # Dockerfile is in backend/ root
      dockerfile: Dockerfile
    container_name: urban-nexus-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy  # wait for mongo to pass healthcheck
    environment:
      NODE_ENV:               production
      PORT:                   5000
      # MongoDB connection uses the service name "mongo" as the host
      # Docker's internal DNS resolves "mongo" to the container IP
      MONGO_URI:              mongodb://mongo:27017/urban-nexus
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRY:             ${JWT_EXPIRY:-7d}
      CLOUDINARY_CLOUD_NAME:  ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:     ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET:  ${CLOUDINARY_API_SECRET}
      CLIENT_ORIGIN:          ${CLIENT_ORIGIN:-http://localhost:3000}
    ports:
      - "5000:5000"
    volumes:
      - backend_logs:/app/logs  # persist Winston log files
    networks:
      - urban-nexus-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 25s

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  urban-nexus-network:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes — persist data across container restarts and rebuilds
# ---------------------------------------------------------------------------
volumes:
  mongo_data:
    driver: local
  backend_logs:
    driver: local